name: tests

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} · Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal test dependencies
        # Provider SDKs (langchain-*, google-genai, anthropic, yt-dlp, faster-whisper)
        # are lazy-imported. The unit suite only needs these three.
        run: |
          python -m pip install --upgrade pip
          pip install pydantic tenacity json-repair

      - name: Byte-compile the package
        run: python -m compileall -q learn_video/

      - name: Run unit tests
        run: python -m unittest discover -s learn_video/tests -t . -v
