name: tests

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dev tooling
        # Ruff + mypy are stdlib-light; adding pydantic so mypy can resolve
        # the Pydantic models' types without pulling the whole provider stack.
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pydantic
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy scripts learn_video

  test:
    name: ${{ matrix.os }} · Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal test dependencies
        # Provider SDKs (langchain-*, google-genai, anthropic, yt-dlp, faster-whisper)
        # are lazy-imported. The unit suite only needs these three.
        run: |
          python -m pip install --upgrade pip
          pip install pydantic tenacity json-repair

      - name: Byte-compile the package and installer
        run: python -m compileall -q learn_video/ scripts/

      - name: Installer non-interactive smoke test
        # Prove the installer parses args, resolves paths, and exits clean
        # across OS × Python. --pack=lite keeps the install small (~200 MB
        # vs 350 for dev) — the installer's own code path is identical
        # regardless of pack. --no-venv reuses actions/setup-python;
        # --skip-smoke-test because the real test suite runs next;
        # dummy key so step_keys doesn't prompt.
        run: |
          python scripts/install.py --yes --pack=lite --no-venv --skip-smoke-test --gemini-key=dummy-ci-key-placeholder

      - name: Run unit tests
        run: python -m unittest discover -s learn_video/tests -t . -v
